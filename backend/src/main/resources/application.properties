# =========================================
# Server Configuration
# =========================================
server.port=8080
server.servlet.context-path=/

# =========================================
# Application Name
# =========================================
spring.application.name=book-management-system

# =========================================
# PostgreSQL Datasource Configuration
# (Defaults for running locally; overridden
#  by environment variables in Docker)
# =========================================
# Uncomment the PostgreSQL lines and comment H2 when running with PostgreSQL
# spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:bookdb}
# spring.datasource.username=${DB_USERNAME:postgres}
# spring.datasource.password=${DB_PASSWORD:postgres}
# spring.datasource.driver-class-name=org.postgresql.Driver

# H2 Database Configuration (for local development)
spring.datasource.url=jdbc:h2:mem:bookdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true

# =========================================
# JPA / Hibernate Configuration
# =========================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.open-in-view=false

# =========================================
# File Upload Configuration
# =========================================
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Directory (relative to working dir, or absolute) where cover images are stored
app.upload.dir=${UPLOAD_DIR:uploads/book-covers}

# Base URL used to build publicly retrievable image URLs
app.base-url=${APP_BASE_URL:http://localhost:8080}

# =========================================
# CORS Configuration
# =========================================
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

# =========================================
# Logging
# =========================================
logging.level.com.bookapi.bookmanagement=DEBUG
logging.level.org.hibernate.SQL=DEBUG
